<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DevTrack - Register</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<!-- ===================== NAVBAR ===================== -->
	<header class="navbar">
		<div class="nav-container">
			<div class="logo">🚀 Dev<span>Track</span></div>
			<nav>
				<a href="index.html">Home</a>
				<a href="login.html">Login</a>
			</nav>
		</div>
	</header>


	<!-- ===================== AUTH SECTION ===================== -->
	<main class="auth-page">

		<div class="auth-container">

			<!-- Left Side (Branding) -->
			<div class="auth-info">
				<h1>Join DevTrack</h1>
				<p>
					Start tracking your DSA progress and job applications in one place.
					Stay consistent and level up your career.
				</p>
			</div>

			<!-- Right Side (Form) -->
			<div class="auth-card">
				<h2>Create Account</h2>

				
				<form id="register-form">

					<label>Name</label>
					<input type="text" id="name" required placeholder="John Doe">
					<small id="name-error" class="error"></small>

					<label>Email</label>
					<input type="email" id="email" required placeholder="john@example.com">
					<small id="email-error" class="error"></small>

					<label>Password</label>
					<div class="password-wrapper">
						<input type="password" id="password" required placeholder="Enter password">
						<button type="button" class="eye-btn" id="toggle-password">👁</button>
					</div>

					<small class="hint">
						Password must be at least 8 characters and include letters and numbers
					</small>
					<small id="password-error" class="error"></small>

					<label>Confirm Password</label>
					<div class="password-wrapper">
						<input type="password" id="confirm-password" required placeholder="Confirm password">
						<button type="button" class="eye-btn" id="toggle-confirm">👁</button>
					</div>

					<small id="confirm-error" class="error"></small>

					<button type="submit">Register</button>
				</form>



				<p class="auth-switch">
					Already have an account?
					<a href="login.html">Login</a>
				</p>
			</div>

		</div>

	</main>


	<!-- ===================== FOOTER ===================== -->
	<footer class="footer">
		<p>© 2026 DevTrack</p>
	</footer>

	<script src="script.js"></script>
</body>
</html>
