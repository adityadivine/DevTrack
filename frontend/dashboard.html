<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DevTrack Dashboard</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<header class="navbar">
	<div class="nav-container">
		<div class="logo">🚀 Dev<span>Track</span></div>
		<nav>
			<a href="#">Dashboard</a>
			<button id="theme-toggle">🌙</button>
			<button class="logout-btn" onclick="logout()">Logout</button>
		</nav>
	</div>
</header>

<main class="dashboard">

	<div class="container">

		<!-- ===================== STATS ===================== -->
		<section class="stats">
			<div class="stat-card">
				<h3 id="total-dsa">0</h3>
				<p>Problems Solved</p>
			</div>
			<div class="stat-card">
				<h3 id="total-apps">0</h3>
				<p>Applications</p>
			</div>
		</section>

		<!-- ===================== FORMS ===================== -->
		<section class="forms-section">

			<div class="card">
				<h2>Add DSA Entry</h2>

				<form id="dsa-form">
					<input type="text" id="problem" required placeholder="Problem (e.g., Two Sum)">
					<input type="text" id="platform" required placeholder="Platform (e.g., LeetCode)">

					<select id="difficulty" required>
						<option value="">Difficulty</option>
						<option>Easy</option>
						<option>Medium</option>
						<option>Hard</option>
					</select>

					<button type="submit">Add Entry</button>
				</form>
			</div>

			<div class="card">
				<h2>Add Application</h2>

				<form id="app-form">
					<input type="text" id="company" required placeholder="Company">
					<input type="text" id="role" required placeholder="Role">

					<select id="status" required>
						<option value="">Status</option>
						<option>Applied</option>
						<option>OA</option>
						<option>Interview</option>
					</select>

					<button type="submit">Add Application</button>
				</form>
			</div>

		</section>

		<!-- ===================== DATA ===================== -->
		<section class="data-section">

			<div class="card">
				<h2>DSA Entries</h2>
				<ul id="dsa-list"></ul>
				<p class="empty" id="dsa-empty">No problems added yet 🚀</p>
			</div>

			<div class="card">
				<h2>Applications</h2>
				<ul id="app-list"></ul>
				<p class="empty" id="app-empty">No applications yet 💼</p>
			</div>

		</section>

	</div>
</main>

<footer class="footer">
	<p>© 2026 DevTrack</p>
</footer>

<script src="script.js"></script>
</body>
</html>
```
