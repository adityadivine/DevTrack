
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DevTrack Dashboard</title>

	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

	<!-- ===================== SIDEBAR ===================== -->
	<aside class="sidebar">

		<div class="sidebar-logo">
			🚀 Dev<span>Track</span>
		</div>

		<nav class="sidebar-nav">
			<a class="active">Dashboard</a>
			<a>DSA Tracker</a>
			<a>Applications</a>
		</nav>

		<div class="sidebar-bottom">
			<button id="theme-toggle" class="nav-btn">🌙</button>
			<button class="logout-btn" onclick="logout()">Logout</button>
		</div>

	</aside>


	<!-- ===================== MAIN ===================== -->
	<main class="main">

		<div class="container">

			<!-- HEADER -->
			<div class="dashboard-header">
				<h1>Dashboard</h1>
				<p>Track your progress and stay consistent 🚀</p>
			</div>

			<!-- STATS -->
			<section class="stats">
				<div class="stat-card">
					<p>Problems Solved</p>
					<h3 id="total-dsa">0</h3>
				</div>
				<div class="stat-card">
					<p>Applications</p>
					<h3 id="total-apps">0</h3>
				</div>
			</section>

			<!-- FORMS -->
			<section class="forms-section">

				<div class="card form-card">
					<h2>Add DSA</h2>

					<form id="dsa-form">
						<input type="text" id="problem" placeholder="Problem">
						<input type="text" id="platform" placeholder="Platform">

						<select id="difficulty">
							<option value="">Difficulty</option>
							<option>Easy</option>
							<option>Medium</option>
							<option>Hard</option>
						</select>

						<button type="submit">Add</button>
					</form>
				</div>

				<div class="card form-card">
					<h2>Add Application</h2>

					<form id="app-form">
						<input type="text" id="company" placeholder="Company">
						<input type="text" id="role" placeholder="Role">

						<select id="status">
							<option value="">Status</option>
							<option>Applied</option>
							<option>OA</option>
							<option>Interview</option>
						</select>

						<button type="submit">Add</button>
					</form>
				</div>

			</section>

			<!-- DATA -->
			<section class="data-section">

				<div class="card data-card">
					<h2>DSA Progress</h2>
					<ul id="dsa-list" class="list"></ul>
					<p class="empty" id="dsa-empty">No problems yet 🚀</p>
				</div>

				<div class="card data-card">
					<h2>Applications</h2>
					<ul id="app-list" class="list"></ul>
					<p class="empty" id="app-empty">No applications yet 💼</p>
				</div>

			</section>

		</div>

	</main>

</div>

<script src="script.js"></script>
</body>
</html>
